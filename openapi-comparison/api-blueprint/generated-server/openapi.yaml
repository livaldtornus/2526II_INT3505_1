openapi: 3.0.3
info:
  description: API quản lý thư viện — cho phép thực hiện CRUD trên sách và thành viên.
  title: Library Management API
  version: 1.0.0
servers:
- url: http://localhost:8001/api/v1
tags:
- name: Books
- name: Members
paths:
  /books:
    get:
      description: ""
      operationId: Lấy danh sách sách
      parameters:
      - description: Số trang
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: number
        style: form
      - description: Số lượng mỗi trang
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          type: number
        style: form
      - description: Tìm theo tiêu đề hoặc tác giả
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: Lọc theo thể loại
        explode: true
        in: query
        name: genre
        required: false
        schema:
          enum:
          - fiction
          - non-fiction
          - science
          - history
          - technology
          - children
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                total: 2
                page: 1
                limit: 10
                data:
                - id: 1
                  title: Nhà Giả Kim
                  author: Paulo Coelho
                  genre: fiction
                  price: 85000
                  available: true
                - id: 2
                  title: Đắc Nhân Tâm
                  author: Dale Carnegie
                  genre: non-fiction
                  price: 95000
                  available: true
              schema:
                $ref: "#/components/schemas/L_y_danh_s_ch_s_ch_200_response"
          description: OK
      summary: Lấy danh sách sách
      tags:
      - Books
    post:
      description: ""
      operationId: Thêm sách mới
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              title: Clean Code
              author: Robert C. Martin
              isbn: "9780132350884"
              genre: technology
              price: 320000
              published_year: 2008
              available: true
            schema:
              $ref: "#/components/schemas/Th_m_s_ch_m_i_request"
      responses:
        "201":
          content:
            application/json:
              example:
                data:
                  id: 3
                  title: Clean Code
                  author: Robert C. Martin
                  isbn: "9780132350884"
                  genre: technology
                  price: 320000
                  published_year: 2008
                  available: true
                  created_at: 2024-01-15T08:30:00Z
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_201_response"
          description: Created
        "400":
          content:
            application/json:
              example:
                error: BAD_REQUEST
                message: Trường 'title' là bắt buộc.
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_400_response"
          description: Bad Request
        "409":
          content:
            application/json:
              example:
                error: CONFLICT
                message: ISBN đã tồn tại.
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_400_response"
          description: Conflict
      summary: Thêm sách mới
      tags:
      - Books
  /books/{id}:
    delete:
      description: ""
      operationId: Xoá sách
      parameters:
      - description: ID của sách
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: number
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                message: Sách đã được xoá thành công.
              schema:
                $ref: "#/components/schemas/Xo__s_ch_200_response"
          description: OK
        "404":
          content:
            application/json:
              example:
                error: NOT_FOUND
                message: Không tìm thấy sách.
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_400_response"
          description: Not Found
      summary: Xoá sách
      tags:
      - Books
    get:
      description: ""
      operationId: Lấy thông tin một sách
      parameters:
      - description: ID của sách
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: number
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                data:
                  id: 1
                  title: Nhà Giả Kim
                  author: Paulo Coelho
                  genre: fiction
                  price: 85000
                  available: true
              schema:
                $ref: "#/components/schemas/L_y_th_ng_tin_m_t_s_ch_200_response"
          description: OK
        "404":
          content:
            application/json:
              example:
                error: NOT_FOUND
                message: Không tìm thấy sách.
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_400_response"
          description: Not Found
      summary: Lấy thông tin một sách
      tags:
      - Books
    put:
      description: ""
      operationId: Cập nhật sách
      parameters:
      - description: ID của sách
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: number
        style: simple
      requestBody:
        content:
          application/json:
            example:
              title: Clean Code (Updated)
              author: Robert C. Martin
              genre: technology
              price: 350000
              available: true
            schema:
              $ref: "#/components/schemas/C_p_nh_t_s_ch_request"
      responses:
        "200":
          content:
            application/json:
              example:
                data:
                  id: 3
                  title: Clean Code (Updated)
              schema:
                $ref: "#/components/schemas/C_p_nh_t_s_ch_200_response"
          description: OK
        "404":
          content:
            application/json:
              example:
                error: NOT_FOUND
                message: Không tìm thấy sách.
              schema:
                $ref: "#/components/schemas/Th_m_s_ch_m_i_400_response"
          description: Not Found
      summary: Cập nhật sách
      tags:
      - Books
  /members:
    get:
      description: ""
      operationId: Lấy danh sách thành viên
      parameters: []
      responses:
        "200":
          content:
            application/json:
              example:
                total: 1
                data:
                - id: 1
                  name: Nguyễn Văn A
                  email: nguyenvana@email.com
                  joined_date: 2024-01-01
              schema:
                $ref: "#/components/schemas/L_y_danh_s_ch_th_nh_vi_n_200_response"
          description: OK
      summary: Lấy danh sách thành viên
      tags:
      - Members
    post:
      description: ""
      operationId: Đăng ký thành viên mới
      parameters: []
      requestBody:
        content:
          application/json:
            example:
              name: Nguyễn Văn B
              email: nguyenvanb@email.com
            schema:
              $ref: "#/components/schemas/__ng_k__th_nh_vi_n_m_i_request"
      responses:
        "201":
          content:
            application/json:
              example:
                data:
                  id: 2
                  name: Nguyễn Văn B
                  email: nguyenvanb@email.com
                  joined_date: 2024-06-20
              schema:
                $ref: "#/components/schemas/__ng_k__th_nh_vi_n_m_i_201_response"
          description: Created
      summary: Đăng ký thành viên mới
      tags:
      - Members
