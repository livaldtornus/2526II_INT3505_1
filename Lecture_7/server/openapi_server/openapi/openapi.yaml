openapi: 3.0.0
info:
  description: API for managing products for Lecture 7 homework.
  title: Product API
  version: 1.0.0
servers:
- url: http://localhost:8080/v1
paths:
  /products:
    get:
      operationId: list_products
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Product"
                type: array
          description: A list of products
      summary: List all products
      x-openapi-router-controller: openapi_server.controllers.default_controller
    post:
      operationId: create_product
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Product created
      summary: Create a new product
      x-openapi-router-controller: openapi_server.controllers.default_controller
  /products/{id}:
    delete:
      operationId: delete_product
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Product deleted
        "404":
          description: Product not found
      summary: Delete a product
      x-openapi-router-controller: openapi_server.controllers.default_controller
    get:
      operationId: get_product
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: A product
        "404":
          description: Product not found
      summary: Get a product by ID
      x-openapi-router-controller: openapi_server.controllers.default_controller
    put:
      operationId: update_product
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
          description: Product updated
        "404":
          description: Product not found
      summary: Update a product
      x-openapi-router-controller: openapi_server.controllers.default_controller
components:
  schemas:
    Product:
      example:
        quantity: 6
        price: 0.8008281904610115
        name: name
        description: description
        id: id
      properties:
        id:
          title: id
          type: string
        name:
          title: name
          type: string
        price:
          title: price
          type: number
        description:
          title: description
          type: string
        quantity:
          title: quantity
          type: integer
      title: Product
      type: object
    ProductInput:
      example:
        quantity: 6
        price: 0.8008281904610115
        name: name
        description: description
      properties:
        name:
          title: name
          type: string
        price:
          title: price
          type: number
        description:
          title: description
          type: string
        quantity:
          title: quantity
          type: integer
      required:
      - name
      - price
      title: ProductInput
      type: object
